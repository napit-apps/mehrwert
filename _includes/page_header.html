<section class="page-title header-padding header-background" {% if page.header_image %} style="background-image:url({{page.header_image}});background-size:cover"{% endif %}>
  <div class="container">
    <div class="row">
      <div class="col-lg-6">
          <h1 class="mb-2 text-white">
            {% if page.layout == "post" %}
            {{ page.title }}
            {%else %}
            {% t page.title %}
            {% endif %}
            </h1>
          <p class="text-white">
            {% if page.layout == "post" %}
            {{ page.description }}
            {%else %}
            {% t page.description %}
            {% endif %}
            </p>
          {% if page.cta-title %}
          <p><a href="{% t page.cta-action %}" class="btn btn-primary">{% t page.cta-title %}</a></p>
          {% endif %}
      </div>
    </div>
  </div>
</section>
